server {
    server_name millerstorm.tech www.millerstorm.tech;

    # Increase upload size limits for large video uploads (up to 1GB)
    client_max_body_size 1000M;
    client_body_timeout 600s;
    client_body_buffer_size 128k;
    
    # Increase proxy timeouts for large file uploads
    proxy_read_timeout 600s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 600s;
    
    # Disable proxy buffering for large uploads
    proxy_request_buffering off;

    location / {
        proxy_pass http://127.0.0.1:6789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for this location
        proxy_read_timeout 600s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
    }

    location /uploads/ {
        alias /var/www/millerstorm/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /_next/static/ {
        alias /var/www/millerstorm/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/millerstorm.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/millerstorm.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.millerstorm.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = millerstorm.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name millerstorm.tech www.millerstorm.tech;
    return 404; # managed by Certbot
}
