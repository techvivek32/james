server {
    listen 80;
    server_name millerstorm.tech www.millerstorm.tech;

    # Increase upload size limits for large video uploads
    client_max_body_size 1000M;
    client_body_timeout 600s;
    client_body_buffer_size 128k;
    proxy_request_buffering off;

    # Root directory for static files
    root /var/www/millerstorm;

    # Logs
    access_log /var/www/millerstorm/logs/nginx-access.log;
    error_log /var/www/millerstorm/logs/nginx-error.log;

    # Proxy to Next.js application
    location / {
        proxy_pass http://127.0.0.1:6789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
    }

    # Static files and uploads
    location /uploads/ {
        alias /var/www/millerstorm/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /_next/static/ {
        alias /var/www/millerstorm/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
